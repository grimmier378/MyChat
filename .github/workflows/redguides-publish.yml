name: Publish to RedGuides

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: "v2.08"
        required: true
        type: string
      message:
        description: "Backport from MyUI."
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref }}"

      - name: Build zip file
        run: git archive --format=zip -o "${{ github.event.repository.name }}_${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}.zip" HEAD

      - name: Write message from workflow input (manual run)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.message != '' }}
        env:
          MESSAGE: ${{ github.event.inputs.message }}
        run: printf "%s\n" "$MESSAGE" > rg_release_notes.md

      - name: Publish to RedGuides
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.message != '' }}
        uses: RedGuides/redguides-publish@v1
        env:
          REDGUIDES_API_KEY: ${{ secrets.REDGUIDES_API_KEY }}
        with:
          resource_id: "3063"
          version: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          file: "${{ github.event.repository.name }}_${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}.zip"
          message: "rg_release_notes.md"
          domain: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.repository.default_branch }}/"

      - name: Publish to RedGuides
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.message == '' }}
        uses: RedGuides/redguides-publish@v1
        env:
          REDGUIDES_API_KEY: ${{ secrets.REDGUIDES_API_KEY }}
        with:
          resource_id: "3063"
          version: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}"
          file: "${{ github.event.repository.name }}_${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}.zip"
          domain: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.event.repository.default_branch }}/"
